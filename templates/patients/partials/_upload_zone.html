<div id="upload-zone-container" x-data="inlineUpload()" class="mb-4">
    <form id="inline-upload-form"
          method="post"
          action="{% url 'patients:upload-document' patient.pk %}"
          enctype="multipart/form-data"
          @submit.prevent="submitUpload()"
          class="relative">
        {% csrf_token %}

        <!-- Drop zone -->
        <div class="border-2 border-dashed rounded-lg p-4 text-center transition-colors cursor-pointer"
             :class="dragOver ? 'border-blue-500 bg-blue-50' : (uploadSuccess ? 'border-green-400 bg-green-50' : 'border-gray-300 hover:border-gray-400 bg-gray-50')"
             @dragover.prevent="dragOver = true"
             @dragleave.prevent="dragOver = false"
             @drop.prevent="handleDrop($event)"
             @click="if (!uploading) $refs.fileInput.click()">

            <!-- Default state -->
            <div x-show="!fileName && !uploading && !uploadSuccess">
                <svg class="mx-auto h-8 w-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                </svg>
                <p class="mt-1 text-sm text-gray-600">
                    <span class="font-medium text-blue-600">Click to upload</span> or drag and drop
                </p>
                <p class="text-xs text-gray-500">PDF only, up to 50MB</p>
            </div>

            <!-- File selected state -->
            <div x-show="fileName && !uploading && !uploadSuccess" x-cloak class="flex items-center justify-center space-x-3">
                <svg class="h-6 w-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                </svg>
                <div class="text-left">
                    <p class="text-sm font-medium text-gray-900" x-text="fileName"></p>
                    <p class="text-xs text-gray-500" x-text="fileSize"></p>
                </div>
                <button type="button" @click.stop="clearFile()" class="p-1 text-gray-400 hover:text-red-500">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- Uploading state -->
            <div x-show="uploading" x-cloak class="flex items-center justify-center space-x-3">
                <svg class="animate-spin h-5 w-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="text-sm text-blue-600 font-medium">Uploading...</span>
            </div>

            <!-- Success state -->
            <div x-show="uploadSuccess" x-cloak class="flex items-center justify-center space-x-2">
                <svg class="h-5 w-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
                <span class="text-sm text-green-700 font-medium">Uploaded! Processing will begin shortly.</span>
            </div>

            <input type="file" x-ref="fileInput" name="file" accept=".pdf"
                   class="hidden" @change="handleFileSelect($event)">
        </div>

        <!-- Error display -->
        <div x-show="errorMsg" x-cloak class="mt-2 p-2 bg-red-50 border border-red-200 rounded-lg">
            <p class="text-sm text-red-600 flex items-center">
                <svg class="w-4 h-4 mr-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span x-text="errorMsg"></span>
            </p>
        </div>

        <!-- Submit button -->
        <div x-show="fileName && !uploading && !uploadSuccess" x-cloak class="mt-3 flex items-center space-x-2">
            <button type="submit"
                    class="inline-flex items-center px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                </svg>
                Upload Document
            </button>
        </div>
    </form>
</div>

<script>
function inlineUpload() {
    return {
        fileName: '',
        fileSize: '',
        dragOver: false,
        uploading: false,
        uploadSuccess: false,
        errorMsg: null,

        handleFileSelect(event) {
            var file = event.target.files[0];
            if (file) this.setFileInfo(file);
        },

        handleDrop(event) {
            this.dragOver = false;
            var file = event.dataTransfer.files[0];
            if (file) {
                this.setFileInfo(file);
                var dt = new DataTransfer();
                dt.items.add(file);
                this.$refs.fileInput.files = dt.files;
            }
        },

        setFileInfo(file) {
            this.errorMsg = null;
            this.uploadSuccess = false;

            if (!file.name.toLowerCase().endsWith('.pdf')) {
                this.errorMsg = 'Only PDF files are allowed.';
                this.fileName = '';
                return;
            }

            var maxSize = 50 * 1024 * 1024;
            if (file.size > maxSize) {
                var sizeMb = (file.size / (1024 * 1024)).toFixed(1);
                this.errorMsg = 'File size (' + sizeMb + 'MB) exceeds the 50MB limit.';
                this.fileName = '';
                return;
            }

            if (file.size === 0) {
                this.errorMsg = 'The selected file is empty.';
                this.fileName = '';
                return;
            }

            this.fileName = file.name;
            this.fileSize = this.formatSize(file.size);
        },

        clearFile() {
            this.fileName = '';
            this.fileSize = '';
            this.errorMsg = null;
            this.$refs.fileInput.value = '';
        },

        async submitUpload() {
            if (!this.$refs.fileInput.files.length) {
                this.errorMsg = 'Please select a file first.';
                return;
            }

            this.uploading = true;
            this.errorMsg = null;

            var form = document.getElementById('inline-upload-form');
            var formData = new FormData(form);

            try {
                var response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'HX-Request': 'true'
                    },
                    credentials: 'same-origin'
                });

                var responseText = await response.text();

                if (response.ok) {
                    var tbody = document.getElementById('documents-tbody');
                    if (tbody) {
                        var emptyRow = document.getElementById('no-documents-row');
                        if (emptyRow) emptyRow.remove();
                        tbody.insertAdjacentHTML('afterbegin', responseText);
                    }

                    this.uploadSuccess = true;
                    this.fileName = '';
                    this.fileSize = '';
                    this.$refs.fileInput.value = '';

                    setTimeout(() => { this.uploadSuccess = false; }, 4000);
                } else {
                    var tempDiv = document.createElement('div');
                    tempDiv.innerHTML = responseText;
                    this.errorMsg = tempDiv.textContent.trim() || 'Upload failed. Please try again.';
                    this.$refs.fileInput.value = '';
                }
            } catch (err) {
                this.errorMsg = 'Network error. Please check your connection.';
            } finally {
                this.uploading = false;
            }
        },

        formatSize(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
    };
}
</script>
