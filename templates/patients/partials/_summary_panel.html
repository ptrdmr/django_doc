{# Patient Summary Side Panel - Renders 7 sections from JSON data via Alpine.js #}
{# Data structure: patient_info, clinical_summary (conditions, procedures, medications, observations, encounters, weight_timeline) #}
<div class="summary-panel-content h-full overflow-y-auto p-4" x-ref="panelContent">
    <!-- Loading state -->
    <div x-show="isLoading" class="flex flex-col items-center justify-center py-12">
        <svg class="animate-spin h-10 w-10 text-blue-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-sm text-gray-600">Loading patient summary...</p>
    </div>

    <!-- Error state -->
    <div x-show="!isLoading && error" class="p-4 bg-red-50 border border-red-200 rounded-lg">
        <p class="text-sm text-red-800 font-medium" x-text="error"></p>
        <button @click="fetchSummary()" class="mt-3 text-sm text-blue-600 hover:text-blue-800 font-medium">
            Retry
        </button>
    </div>

    <!-- Content: 7 sections -->
    <template x-if="!isLoading && !error && summaryData">
        <div class="space-y-4">
            <!-- Section 1: Demographics & Context -->
            <div class="section bg-gray-50 rounded-lg p-4 border-l-4 border-blue-500">
                <h3 class="text-sm font-semibold text-gray-900 mb-3 flex items-center">
                    <span class="w-6 h-6 rounded-full bg-blue-500 text-white text-xs flex items-center justify-center mr-2">1</span>
                    Demographics & Context
                </h3>
                <div class="grid grid-cols-2 gap-2 text-sm">
                    <div><span class="text-gray-500">Age:</span> <span x-text="summaryData?.patient_info?.age || 'N/A'"></span></div>
                    <div><span class="text-gray-500">Gender:</span> <span x-text="summaryData?.patient_info?.gender || 'N/A'"></span></div>
                    <div class="col-span-2">
                        <span class="text-gray-500">Primary Diagnosis:</span>
                        <span x-text="summaryData?.patient_info?.primary_diagnosis?.display_name || 'Not specified'"></span>
                    </div>
                    <div><span class="text-gray-500">ICD-10:</span> <span x-text="summaryData?.patient_info?.primary_diagnosis?.codes?.[0]?.code || 'N/A'"></span></div>
                    <div><span class="text-gray-500">Living Setting:</span> <span x-text="summaryData?.patient_info?.living_setting || 'N/A'"></span></div>
                </div>
                <template x-if="summaryData?.patient_info?.comorbidities?.length">
                    <div class="mt-2 text-sm">
                        <span class="text-gray-500">Comorbidities:</span>
                        <span x-text="(summaryData?.patient_info?.comorbidities || []).map(c => c.display_name).join('; ')"></span>
                    </div>
                </template>
            </div>

            <!-- Section 2: Diagnoses with Onset Dates -->
            <div class="section bg-gray-50 rounded-lg p-4 border-l-4 border-blue-500">
                <h3 class="text-sm font-semibold text-gray-900 mb-3 flex items-center">
                    <span class="w-6 h-6 rounded-full bg-blue-500 text-white text-xs flex items-center justify-center mr-2">2</span>
                    Diagnoses with Clinical Onset Dates
                </h3>
                <template x-if="summaryData?.clinical_summary?.conditions?.length">
                    <div class="space-y-2 text-sm">
                        <template x-for="(c, idx) in summaryData.clinical_summary.conditions" :key="'cond-' + idx">
                            <div class="p-2 bg-white rounded border border-gray-100">
                                <span class="font-medium" x-text="c.display_name || 'Unknown'"></span> |
                                ICD-10: <span x-text="c.codes?.[0]?.code || 'Not coded'"></span> |
                                Onset: <span x-text="c.onset_date ? new Date(c.onset_date).toLocaleDateString() : 'Not recorded'"></span>
                            </div>
                        </template>
                    </div>
                </template>
                <div x-show="!summaryData?.clinical_summary?.conditions?.length" class="text-sm text-gray-500 italic py-2">No diagnoses recorded</div>
            </div>

            <!-- Section 3: Weight Tracking -->
            <div class="section bg-gray-50 rounded-lg p-4 border-l-4 border-blue-500">
                <h3 class="text-sm font-semibold text-gray-900 mb-3 flex items-center">
                    <span class="w-6 h-6 rounded-full bg-blue-500 text-white text-xs flex items-center justify-center mr-2">3</span>
                    Weight Tracking
                </h3>
                <template x-if="summaryData?.clinical_summary?.weight_timeline?.has_data">
                    <div class="overflow-x-auto">
                        <table class="min-w-full text-sm">
                            <thead><tr class="border-b"><th class="text-left py-1">Date</th><th class="text-left py-1">Weight</th></tr></thead>
                            <tbody>
                                <template x-for="(p, idx) in (summaryData.clinical_summary.weight_timeline.data_points || [])" :key="'wt-' + idx">
                                    <tr class="border-b border-gray-100">
                                        <td class="py-1" x-text="p.date ? new Date(p.date).toLocaleDateString() : 'N/A'"></td>
                                        <td class="py-1" x-text="(p.weight || '—') + ' ' + (summaryData.clinical_summary.weight_timeline.unit || '')"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
                <div x-show="!summaryData?.clinical_summary?.weight_timeline?.has_data" class="text-sm text-gray-500 italic py-2">No weight data recorded</div>
            </div>

            <!-- Section 4: Hospitalizations -->
            <div class="section bg-gray-50 rounded-lg p-4 border-l-4 border-blue-500">
                <h3 class="text-sm font-semibold text-gray-900 mb-3 flex items-center">
                    <span class="w-6 h-6 rounded-full bg-blue-500 text-white text-xs flex items-center justify-center mr-2">4</span>
                    Hospitalizations
                </h3>
                <template x-if="summaryData?.clinical_summary?.encounters?.length">
                    <div class="space-y-2 text-sm">
                        <template x-for="(e, idx) in summaryData.clinical_summary.encounters" :key="'enc-' + idx">
                            <div class="p-2 bg-white rounded border border-gray-100">
                                <span class="font-medium" x-text="(e.period?.start ? new Date(e.period.start).toLocaleDateString() : 'Unknown') + (e.period?.end ? ' - ' + new Date(e.period.end).toLocaleDateString() : ' - Ongoing')"></span> |
                                Reason: <span x-text="e.reason?.[0]?.display || e.reason?.[0]?.code || 'Not specified'"></span>
                            </div>
                        </template>
                    </div>
                </template>
                <div x-show="!summaryData?.clinical_summary?.encounters?.length" class="text-sm text-gray-500 italic py-2">No hospitalizations recorded</div>
            </div>

            <!-- Section 5: Labs -->
            <div class="section bg-gray-50 rounded-lg p-4 border-l-4 border-blue-500">
                <h3 class="text-sm font-semibold text-gray-900 mb-3 flex items-center">
                    <span class="w-6 h-6 rounded-full bg-blue-500 text-white text-xs flex items-center justify-center mr-2">5</span>
                    Labs
                </h3>
                <template x-if="summaryData?.clinical_summary?.observations?.length">
                    <div class="space-y-2 text-sm">
                        <template x-for="(o, idx) in summaryData.clinical_summary.observations" :key="'obs-' + idx">
                            <div class="p-2 bg-white rounded border border-gray-100">
                                <span class="font-medium" x-text="o.display_name || 'Unknown'"></span> |
                                <span x-text="(o.value != null ? o.value : '—') + (o.unit ? ' ' + o.unit : '')"></span> |
                                Date: <span x-text="o.effective_date ? new Date(o.effective_date).toLocaleDateString() : 'Not recorded'"></span>
                            </div>
                        </template>
                    </div>
                </template>
                <div x-show="!summaryData?.clinical_summary?.observations?.length" class="text-sm text-gray-500 italic py-2">No lab results recorded</div>
            </div>

            <!-- Section 6: Medications -->
            <div class="section bg-gray-50 rounded-lg p-4 border-l-4 border-blue-500">
                <h3 class="text-sm font-semibold text-gray-900 mb-3 flex items-center">
                    <span class="w-6 h-6 rounded-full bg-blue-500 text-white text-xs flex items-center justify-center mr-2">6</span>
                    Medications
                </h3>
                <template x-if="summaryData?.clinical_summary?.medications?.length">
                    <div class="space-y-2 text-sm">
                        <template x-for="(m, idx) in summaryData.clinical_summary.medications" :key="'med-' + idx">
                            <div class="p-2 bg-white rounded border border-gray-100">
                                <span class="font-medium" x-text="m.display_name || 'Unknown'"></span> |
                                Dose: <span x-text="(m.dosage && m.dosage[0]) ? (m.dosage[0].text || m.dosage[0].dose || 'Not specified') : 'Not specified'"></span> |
                                Started: <span x-text="(m.effective_period && m.effective_period.start) ? new Date(m.effective_period.start).toLocaleDateString() : 'Unknown'"></span>
                            </div>
                        </template>
                    </div>
                </template>
                <div x-show="!summaryData?.clinical_summary?.medications?.length" class="text-sm text-gray-500 italic py-2">No medications recorded</div>
            </div>

            <!-- Section 7: Procedures -->
            <div class="section bg-gray-50 rounded-lg p-4 border-l-4 border-blue-500">
                <h3 class="text-sm font-semibold text-gray-900 mb-3 flex items-center">
                    <span class="w-6 h-6 rounded-full bg-blue-500 text-white text-xs flex items-center justify-center mr-2">7</span>
                    Procedures
                </h3>
                <template x-if="summaryData?.clinical_summary?.procedures?.length">
                    <div class="space-y-2 text-sm">
                        <template x-for="(p, idx) in summaryData.clinical_summary.procedures" :key="'proc-' + idx">
                            <div class="p-2 bg-white rounded border border-gray-100">
                                <span class="font-medium" x-text="p.display_name || 'Unknown'"></span> |
                                Date: <span x-text="p.performed_date ? new Date(p.performed_date).toLocaleDateString() : 'Not recorded'"></span> |
                                <span x-text="p.outcome || 'Completed'"></span>
                            </div>
                        </template>
                    </div>
                </template>
                <div x-show="!summaryData?.clinical_summary?.procedures?.length" class="text-sm text-gray-500 italic py-2">No procedures recorded</div>
            </div>

            <!-- Footer -->
            <div class="text-xs text-gray-500 pt-4 border-t border-gray-200">
                <p>Generated from structured clinical data. Contains PHI—handle per HIPAA.</p>
            </div>
        </div>
    </template>
</div>
